[include fluidd.cfg]
# This is HPLC tube main config file
# by Eric jd gao 202.12.25
#####################################################################
# Includes
#####################################################################

# Stepper motor and tmc Settings
[include motor_config.cfg]
[include motor_id.cfg]
# Macros — 三层架构
[include basic_macro.cfg]     # 层1: 内部原语（无M400）
[include workflow_macro.cfg]  # 层2: 对外业务宏（末尾M400，Python调用）
[include fluidd_macro.cfg]    # 层3: 调试宏（仅Fluidd手动）
[include teaching_point.cfg]

#####################################################################
# 待机时间保持电机力矩
#####################################################################

[idle_timeout] 
timeout:60000000

[respond]
default_type: echo
# Sets the default prefix of the "M118" and "RESPOND" output to one
# of the following:
# echo: "echo: " (This is the default)
#command: "// "
# error: "!! "
#default_prefix: echo:
# Directly sets the default pre

[force_move]
enable_force_move: True
#####################################################################
# Virtual SD Card
#####################################################################

[virtual_sdcard]
path: /home/pi/printer_data/gcodes

#####################################################################
## 以下在 Fluidd/Mainsail中需要，否则会报黄色警告
#####################################################################
[pause_resume]
[display_status]
[gcode_macro CANCEL_PRINT]
description: 无实际作用，避免出现黄字报错
rename_existing: CANCEL_PRINT_BASE
gcode:

#####################################################################
# FAN SETING
#####################################################################
[fan]
pin: PA2





 
 



 







