######################################################################
# Home ALl | 整机回原点
######################################################################
[gcode_macro HOME_ALL]
description: all the motor home
gcode:

 HOME_Z_IN
 HOME_Z_OUT
 #-------两个编码器需要置零--------

 #入料推杆到到夹爪托盘的位置
 [gcode_macro Z_IN_UNDER_GRIPPER]
 G4 P200

 G_OPEN
 #出料推杆缓慢到到料仓基准面位置
 
 Z_IN_TOP_SLOW
 Z_OUT_TOP_FAST
 
 
 #夹爪回原点做位置校准
 HOME_G
 #大转盘做位置校准
 HOME_RB
 #检查泵的控制状态是否正常 相反的方向启动泵1圈
 HOME_P
 

 M118 "ALL homing finshied"
 M400





##################################################################
# Home RS | 通过 Y 回原点修正 完成小转盘的回原点和定位 逆时针为负值
# 回原点逆时针 走负坐标
#####################################################################

[gcode_macro HOME_RS]
description: home rs
gcode:
 USER_VARIABLE
 {% set rs_home_offset = printer["gcode_macro USER_VARIABLE"].rs_home_offset %}
 {% set rs_home_speed = printer["gcode_macro USER_VARIABLE"].rs_home_speed %}
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed} MOVE=1 STOP_ON_ENDSTOP=1
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed} MOVE=-0.15
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed/2} MOVE=0.4 STOP_ON_ENDSTOP=1
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 #走一个补偿量 校准位置偏差
 MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed}  MOVE={rs_home_offset}
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 M118 "RS axis homed."
 M400

##################################################################
# Home RB | 通过 X 回原点修正 完成大转盘的回原点和定位 顺时针为正值
# 回原点逆时针 走负坐标
#####################################################################

[gcode_macro HOME_RB]
description: home rb
gcode:
 USER_VARIABLE
 {% set rb_home_offset = printer["gcode_macro USER_VARIABLE"].rb_home_offset %}
 G28 X
 M118 "RB axis homed."
 G91
 G1 X{rb_home_offset} F3
 G90
 G92 X0
 M118 "RB axis offset applied: {rb_home_offset}"
 M400

[gcode_macro HOME_Z_IN]
description: 入料推杆回原点
gcode:
 USER_VARIABLE
 {% set rs_home_offset = printer["gcode_macro USER_VARIABLE"].rs_home_offset %}


 {% set home_speed = printer["gcode_macro USER_VARIABLE"].z_in_home_speed %}
 {% set Home_Distance =printer["gcode_macro USER_VARIABLE"].z_in_home_distance %}
 {% set z_in_home_offset = printer["gcode_macro USER_VARIABLE"].z_in_home_offset %}
 MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
 # 先走一个补偿量 让推杆原理原点
 MANUAL_STEPPER STEPPER=stepper_z_in SPEED={home_speed}  MOVE={z_in_home_offset * 1.5}
 MANUAL_STEPPER STEPPER=stepper_z_in ENABLE=1 SPEED={home_speed} SET_POSITION=0 MOVE=-{Home_Distance} STOP_ON_ENDSTOP=1 
 MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0 SPEED={home_speed}  MOVE=-{z_in_home_offset}
 MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
 SET_GCODE_VARIABLE MACRO=JOG_Z_IN VARIABLE=z_in_position VALUE=0
 M118 " z_in current position is {z_in_position} mm "
 M118 " z_in motor home finished" 
 M400


#####################################################################
# Home z_out  | Z轴（出料推杆）回原点   正值代表 Z 推杆向上移动  原点在最下方  回原点走 向下移动
#默认推杆在最下方触发光耦
#max distance is 175mm 
#####################################################################
[gcode_macro HOME_Z_OUT]
description: 出料推杆回原点

gcode:
 USER_VARIABLE
 {% set rs_home_offset = printer["gcode_macro USER_VARIABLE"].rs_home_offset %}


 {% set home_speed = printer["gcode_macro USER_VARIABLE"].z_out_home_speed %}
 {% set Home_Distance =printer["gcode_macro USER_VARIABLE"].z_out_home_distance %}
 {% set z_out_home_offset = printer["gcode_macro USER_VARIABLE"].z_out_home_offset %}
 MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
 # 先走一个补偿量 让推杆原理原点
 MANUAL_STEPPER STEPPER=stepper_z_out SPEED={home_speed}  MOVE={z_out_home_offset * 1.5}
 MANUAL_STEPPER STEPPER=stepper_z_out ENABLE=1 SPEED={home_speed} SET_POSITION=0 MOVE=-{Home_Distance} STOP_ON_ENDSTOP=1 
 MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0 SPEED={home_speed}  MOVE=-{z_out_home_offset}
 MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
 SET_GCODE_VARIABLE MACRO=JOG_Z_OUT VARIABLE=z_out_position VALUE=0
 M118 " z_out current position is {z_out_position} mm "
 M118 " z_out motor home finished" 
 M400
 


#####################################################################
# Home g | 顶部夹爪回原点 （主夹爪）
#夹爪回原点方向为正值  夹爪张开方向为正方向
#回原点后夹爪是关闭状态
#####################################################################

[gcode_macro HOME_G]
description: home g
gcode:


 {% set gripper_speed = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
 {% set gripper_home_distance = printer["gcode_macro USER_VARIABLE"].gripper_home_distance %}
 {% set gripper_home_offset = printer["gcode_macro USER_VARIABLE"].gripper_home_offset %}
 {% set gripper_close_pos = printer["gcode_macro USER_VARIABLE"].gripper_close_pos %}

 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0 
 MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE=-1
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0 
 MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE={gripper_home_distance} STOP_ON_ENDSTOP=1 
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0 
 M400





#####################################################################
# Home P 蠕动泵回原点 用于状态观察
#####################################################################

[gcode_macro HOME_P]
description: home r
gcode:

 {% set home_speed =2 %}
 {% set Home_Distance =1 %} 
 MANUAL_STEPPER STEPPER=stepper_p  SET_POSITION=0 SPEED={home_speed} MOVE={Home_Distance}
 MANUAL_STEPPER STEPPER=stepper_p SET_POSITION=0 
 M400





#JOG类函数 用于调试 

#JOG类函数 用于调试 

[gcode_macro JOG_Z_OUT]
description: jog z_out motor
variable_z_out_position: 0
gcode:
 {% set z_out_distance = params.DISTANCE|default(10)|float %}
 {% set z_out_speed = params.SPD|default(100)|float %}
 {% set new_position = printer["gcode_macro JOG_Z_OUT"].z_out_position + z_out_distance %}

 SET_GCODE_VARIABLE MACRO=JOG_Z_OUT VARIABLE=z_out_position VALUE={new_position}
 MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed} MOVE={z_out_distance} 
 M118 "z_out move {z_out_distance} mm "
 M118 "z_out current position is  {new_position} mm "
 M400

[gcode_macro JOG_RS]
description: jog rs motor
variable_rs_position: 0
gcode:
 {% set rs_distance = params.DISTANCE|default(0.1)|float %}
 {% set rs_speed = params.SPD|default(1.5)|float %}
 MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_speed} MOVE={rs_distance} 
 M118 "rs move {rs_distance} mm "
 M118 "rs current position is  {rs_position} mm "
 M400

[gcode_macro JOG_Z_IN]
description: jog z_in motor
variable_z_in_position: 0
gcode:
 {% set z_in_distance = params.DISTANCE|default(10)|float %}
 {% set z_in_speed = params.SPD|default(100)|float %}
 {% set new_position = printer["gcode_macro JOG_Z_IN"].z_in_position + z_in_distance %}

 SET_GCODE_VARIABLE MACRO=JOG_Z_IN VARIABLE=z_in_position VALUE={new_position}
 MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_z_in SPEED={z_in_speed} MOVE={z_in_distance}
 M118 "z_in move {z_in_distance} mm "
 M118 "z_out current position is  {new_position} mm "
 M400

[gcode_macro JOG_ZG]
description: jog z_out motor
variable_z_out_position: 0
gcode:
 {% set z_out_distance = params.DISTANCE|default(10)|float %}
 {% set z_out_speed = params.SPD|default(100)|float %}
  G91
  G1 z {zg_abs_pos}  f {zg_Speed * 60}
  G90 
  M114
  M118 "z_out move {z_out_distance} mm "
  M118 "z_out current position is  {new_position} mm "
  M400


[gcode_macro JOG_G]
description: jog g motor
variable_g_position: 0
gcode:
 
 {% set g_distance = params.DISTANCE|default(2)|float %}
 {% set g_speed = 15 %}
 # 累加总移动距离
 {% set new_position = printer["gcode_macro JOG_G"].g_position + g_distance %}
 SET_GCODE_VARIABLE MACRO=JOG_G VARIABLE=g_position VALUE={new_position}
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_g SPEED={g_speed} MOVE={g_distance}
 SAVE_VARIABLE VARIABLE="g_pos"  VALUE={new_position}
 M118 "g move {g_distance} mm "
 M118 "g current position is {new_position} mm "
 M400

#大转盘释放 用于调试
[gcode_macro RB_RELEASE]
description: rb release
gcode:
 SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=0
 M400








  
  





    

   
