#======================================================================
# fluidd_macro.cfg — 调试专用
# 规则：仅在 Fluidd 界面手动触发，禁止 Python send_gcode_command() 调用
#======================================================================

######################################################################
# JOG 类 — 电机点动调试
######################################################################

[gcode_macro JOG_Z_OUT]
description: jog z_out motor by relative distance
variable_z_out_position: 0
gcode:
  {% set distance = params.DISTANCE|default(10)|float %}
  {% set spd      = params.SPD|default(100)|float %}
  {% set new_pos  = printer["gcode_macro JOG_Z_OUT"].z_out_position + distance %}
  SET_GCODE_VARIABLE MACRO=JOG_Z_OUT VARIABLE=z_out_position VALUE={new_pos}
  MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={spd} MOVE={distance}
  M118 "z_out move {distance} mm, total {new_pos} mm"
  M400

[gcode_macro JOG_Z_IN]
description: jog z_in motor by relative distance
variable_z_in_position: 0
gcode:
  {% set distance = params.DISTANCE|default(10)|float %}
  {% set spd      = params.SPD|default(100)|float %}
  {% set new_pos  = printer["gcode_macro JOG_Z_IN"].z_in_position + distance %}
  SET_GCODE_VARIABLE MACRO=JOG_Z_IN VARIABLE=z_in_position VALUE={new_pos}
  MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={spd} MOVE={distance}
  M118 "z_in move {distance} mm, total {new_pos} mm"
  M400

[gcode_macro JOG_RS]
description: jog RS motor by relative distance
variable_rs_position: 0
gcode:
  {% set distance = params.DISTANCE|default(0.1)|float %}
  {% set spd      = params.SPD|default(1.5)|float %}
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={spd} MOVE={distance}
  M118 "rs move {distance} mm"
  M400

[gcode_macro JOG_G]
description: jog gripper motor by relative distance
variable_g_position: 0
gcode:
  {% set distance = params.DISTANCE|default(2)|float %}
  {% set new_pos  = printer["gcode_macro JOG_G"].g_position + distance %}
  SET_GCODE_VARIABLE MACRO=JOG_G VARIABLE=g_position VALUE={new_pos}
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED=15 MOVE={distance}
  SAVE_VARIABLE VARIABLE="g_pos" VALUE={new_pos}
  M118 "g move {distance} mm, total {new_pos} mm"
  M400

# 大转盘断电释放（调试用）
[gcode_macro RB_RELEASE]
description: disable RB stepper for manual rotation
gcode:
  SET_STEPPER_ENABLE STEPPER=stepper_x ENABLE=0
  M400

######################################################################
# TEST 类 — 并发动作验证
######################################################################

# Z_OUT 3步 + Z_IN 1步并发（验证同时启动）
[gcode_macro TEST_MULTI_A]
description: Z_OUT 3 moves then Z_IN 1 move (all SYNC=0)
gcode:
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=25 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=50 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=75 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_in  SPEED=200 MOVE=50 SYNC=0
  M400

# Z_IN 先发，Z_OUT 后发（验证发送顺序影响）
[gcode_macro TEST_MULTI_B]
description: Z_IN first then Z_OUT 3 moves (all SYNC=0)
gcode:
  MANUAL_STEPPER STEPPER=stepper_z_in  SPEED=200 MOVE=50 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=25 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=50 SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED=100 MOVE=75 SYNC=0
  M400

# 快速归位（Z_IN + Z_OUT 并行回底）
[gcode_macro TEST_RESET]
description: move Z_IN + Z_OUT back to bottom in parallel
gcode:
  {% set z_in_speed       = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  {% set z_out_speed      = printer["gcode_macro USER_VARIABLE"].z_out_speed %}
  {% set z_in_bottom_pos  = printer["gcode_macro USER_VARIABLE"].z_in_bottom_pos %}
  {% set z_out_bottom_pos = printer["gcode_macro USER_VARIABLE"].z_out_bottom_pos %}
  MANUAL_STEPPER STEPPER=stepper_z_in  SPEED={z_in_speed}  MOVE={z_in_bottom_pos}  SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed} MOVE={z_out_bottom_pos} SYNC=0
  M400
