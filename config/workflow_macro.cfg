#======================================================================
# workflow_macro.cfg — 对外业务宏层
# 规则：每个宏末尾有且只有一个 M400；只被 Python send_gcode_command() 调用
# 内部可调用 basic_macro.cfg 中的原语，禁止嵌套调用含 M400 的宏
#======================================================================

######################################################################
# 单步动作宏（Python 直接调用）
######################################################################

# 小转盘切换一个工位（逆时针）
[gcode_macro STEP_RS_MOV]
description: RS move 1/5 circle (one position)
gcode:
  {% set rs_mov_speed = printer["gcode_macro USER_VARIABLE"].rs_mov_speed %}
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_mov_speed} MOVE=-0.2
  M400

# 大转盘切换一个工位
[gcode_macro STEP_RB_MOV_ONE]
description: RB move 1/10 circle (one position)
gcode:
  {% set rb_mov_speed = printer["gcode_macro USER_VARIABLE"].rb_mov_speed %}
  G91
  G1 X-0.1 F{rb_mov_speed * 60}
  G90
  M400

# 大转盘切换两个工位
[gcode_macro STEP_RB_MOV_DOUBLE]
description: RB move 2/10 circle (two positions)
gcode:
  {% set rb_mov_speed = printer["gcode_macro USER_VARIABLE"].rb_mov_speed %}
  G91
  G1 X-0.2 F{rb_mov_speed * 60}
  G90
  M400

# 出料推杆推出培养皿并回到水平面
[gcode_macro STEP_Z_OUT_RELEASE]
description: z_out push dish out then return to base
gcode:
  {% set z_out_release_pos  = printer["gcode_macro USER_VARIABLE"].z_out_release_pos %}
  {% set z_out_bottom_pos   = printer["gcode_macro USER_VARIABLE"].z_out_bottom_pos %}
  {% set z_out_speed        = printer["gcode_macro USER_VARIABLE"].z_out_speed %}
  {% set z_out_top_pos      = printer["gcode_macro USER_VARIABLE"].z_out_top_pos %}
  {% set petri_dish_height  = printer["gcode_macro USER_VARIABLE"].petri_dish_height %}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed}   MOVE={z_out_bottom_pos+25}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed/3} MOVE={z_out_bottom_pos+20+25}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed}   MOVE={z_out_top_pos-petri_dish_height-1}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed/3} MOVE={z_out_release_pos}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed/3} MOVE={z_out_top_pos}
  M400

# 夹爪完整打开（含M400，对外接口）
[gcode_macro STEP_G_OPEN]
description: gripper open with M400
gcode:
  {% set gripper_speed         = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_home_distance = printer["gcode_macro USER_VARIABLE"].gripper_home_distance %}
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE={gripper_home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  M400

# 夹爪完整关闭（含M400，对外接口）
[gcode_macro STEP_G_CLOSE]
description: gripper close with M400
gcode:
  {% set gripper_speed     = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_close_pos = printer["gcode_macro USER_VARIABLE"].gripper_close_pos %}
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE=-{gripper_close_pos}
  M400

# 入料推杆移到夹爪正下方
[gcode_macro STEP_Z_IN_UNDER_GRIPPER]
description: z_in move to just under gripper
gcode:
  {% set z_in_top_pos       = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  {% set z_in_griper_offset = printer["gcode_macro USER_VARIABLE"].z_in_griper_offset %}
  {% set petri_dish_height  = printer["gcode_macro USER_VARIABLE"].petri_dish_height %}
  {% set z_in_speed         = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  Z_IN_MOV_ABS POS={z_in_top_pos - z_in_griper_offset - petri_dish_height} SPD={z_in_speed}
  M400

# 入料推杆慢速到顶
[gcode_macro STEP_Z_IN_TOP_SLOW]
description: z_in move to top slow
gcode:
  {% set z_in_top_pos = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  {% set z_in_speed   = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  Z_IN_MOV_ABS POS={z_in_top_pos} SPD={z_in_speed/4}
  M400

# 入料推杆快速到顶
[gcode_macro STEP_Z_IN_TOP_FAST]
description: z_in move to top fast
gcode:
  {% set z_in_top_pos = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  {% set z_in_speed   = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  Z_IN_MOV_ABS POS={z_in_top_pos} SPD={z_in_speed}
  M400

# 出料推杆快速到顶
[gcode_macro STEP_Z_OUT_TOP_FAST]
description: z_out move to top fast
gcode:
  {% set z_out_top_pos = printer["gcode_macro USER_VARIABLE"].z_out_top_pos %}
  {% set z_out_speed   = printer["gcode_macro USER_VARIABLE"].z_out_speed %}
  Z_OUT_MOV_ABS POS={z_out_top_pos} SPD={z_out_speed}
  M400

# 入料推杆到底
[gcode_macro STEP_Z_IN_BOTTOM]
description: z_in move to bottom
gcode:
  {% set z_in_bottom_pos = printer["gcode_macro USER_VARIABLE"].z_in_bottom_pos %}
  {% set z_in_speed      = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={z_in_speed/5} MOVE={z_in_bottom_pos+52}
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={z_in_speed}   MOVE={z_in_bottom_pos}
  M400

# 出料推杆到底
[gcode_macro STEP_Z_OUT_BOTTOM]
description: z_out move to bottom
gcode:
  {% set z_out_bottom_pos = printer["gcode_macro USER_VARIABLE"].z_out_bottom_pos %}
  {% set z_out_speed      = printer["gcode_macro USER_VARIABLE"].z_out_speed %}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={z_out_speed} MOVE={z_out_bottom_pos}
  M400

# 进料动作 01 — 料仓第一个培养皿
[gcode_macro STEP_DISK_FEEDING_FIRST]
description: feed first dish from tray (base as reference)
gcode:
  {% set z_in_griper_offset = printer["gcode_macro USER_VARIABLE"].z_in_griper_offset %}
  {% set petri_dish_height  = printer["gcode_macro USER_VARIABLE"].petri_dish_height %}
  {% set z_in_speed         = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  {% set z_in_top_pos       = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  Z_IN_MOV_ABS POS={z_in_top_pos - z_in_griper_offset - petri_dish_height*2} SPD={z_in_speed*0.6}
  M400

# 进料动作 02 — 料仓后续培养皿
[gcode_macro STEP_DISK_FEEDING_SECOND]
description: feed subsequent dishes from tray
gcode:
  {% set z_in_griper_offset = printer["gcode_macro USER_VARIABLE"].z_in_griper_offset %}
  {% set petri_dish_height  = printer["gcode_macro USER_VARIABLE"].petri_dish_height %}
  {% set z_in_speed         = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  {% set z_in_top_pos       = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  Z_IN_MOV_ABS POS={z_in_top_pos - z_in_griper_offset - petri_dish_height} SPD={z_in_speed*0.6}
  M400

######################################################################
# 核心并发宏 — 取皿 + 推出 + 泵液（四路并行）
#
# 前置条件：RS 已旋转完，Z_IN 和 Z_OUT 均在底部
# 执行完毕：Z_IN 和 Z_OUT 均回底部，可进行编码器校验
#
# 并行轨道：
#   Track 1 (Z_IN+夹爪): 上移→开夹爪→下移取皿→关夹爪→归底（阻塞顺序）
#   Track 2 (Z_OUT):     推出5步→归底                    (SYNC=0)
#   Track 3 (PUMP):      泵液 VOL 圈                     (SYNC=0)
#
# 原理：先发 SYNC=0 启动 Z_OUT+PUMP，再走 Z_IN+夹爪阻塞序列，
#       M400 统一收口
######################################################################
[gcode_macro STEP_PHASE]
description: concurrent pick + push + pump (4 motors parallel)
gcode:
  {% set pump_volume = params.VOL|default(0)|float %}
  {% set pump_speed  = params.SPEED|default(1)|float %}

  {% set z_in_speed         = printer["gcode_macro USER_VARIABLE"].z_in_speed %}
  {% set z_in_top_pos       = printer["gcode_macro USER_VARIABLE"].z_in_top_pos %}
  {% set z_in_griper_offset = printer["gcode_macro USER_VARIABLE"].z_in_griper_offset %}
  {% set z_in_bottom_pos    = printer["gcode_macro USER_VARIABLE"].z_in_bottom_pos %}
  {% set petri_dish_height  = printer["gcode_macro USER_VARIABLE"].petri_dish_height %}

  {% set z_out_speed       = printer["gcode_macro USER_VARIABLE"].z_out_speed %}
  {% set z_out_bottom_pos  = printer["gcode_macro USER_VARIABLE"].z_out_bottom_pos %}
  {% set z_out_top_pos     = printer["gcode_macro USER_VARIABLE"].z_out_top_pos %}
  {% set z_out_release_pos = printer["gcode_macro USER_VARIABLE"].z_out_release_pos %}

  {% set gripper_speed         = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_close_pos     = printer["gcode_macro USER_VARIABLE"].gripper_close_pos %}
  {% set gripper_home_distance = printer["gcode_macro USER_VARIABLE"].gripper_home_distance %}

  # ══ Phase 1: 取皿（纯阻塞） ══════════════════════════════════════
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={z_in_speed*0.6} MOVE={z_in_top_pos - z_in_griper_offset - petri_dish_height}
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE={gripper_home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={z_in_speed*0.6} MOVE={z_in_top_pos - z_in_griper_offset - petri_dish_height*2}
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE=-{gripper_close_pos}

  # ══ Phase 2: 归位 + 推出 + 泵液（三路并行） ═════════════════════
  MANUAL_STEPPER STEPPER=stepper_z_in   SPEED={z_in_speed/3}  MOVE={z_in_bottom_pos+52}             SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_in   SPEED={z_in_speed}    MOVE={z_in_bottom_pos}                SYNC=0
  MANUAL_STEPPER STEPPER=stepper_p      SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_p      SPEED={pump_speed}    MOVE={pump_volume}                    SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed}   MOVE={z_out_bottom_pos+25}            SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed/5} MOVE={z_out_bottom_pos+20+25}         SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed}   MOVE={z_out_top_pos-petri_dish_height-1} SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed/5} MOVE={z_out_release_pos}              SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed/5} MOVE={z_out_top_pos}                  SYNC=0
  MANUAL_STEPPER STEPPER=stepper_z_out  SPEED={z_out_speed}   MOVE={z_out_bottom_pos}               SYNC=0

  # ══ 同步所有 stepper 时间线，统一收口 ════════════════════════════
  MANUAL_STEPPER STEPPER=stepper_z_in  SYNC=1
  MANUAL_STEPPER STEPPER=stepper_p     SYNC=1
  MANUAL_STEPPER STEPPER=stepper_z_out SYNC=1
  M400


######################################################################
# 归零 / 回原点宏（Home）
######################################################################

# 整机回原点
[gcode_macro HOME_ALL]
description: home all motors in sequence
gcode:
  HOME_Z_IN
  HOME_Z_OUT
  G4 P200
  G_OPEN
  STEP_Z_IN_TOP_SLOW
  STEP_Z_OUT_TOP_FAST
  HOME_G
  HOME_RB
  HOME_P
  M118 "ALL homing finished"
  M400

# 小转盘回原点
[gcode_macro HOME_RS]
description: home RS axis via Y endstop
gcode:
  USER_VARIABLE
  {% set rs_home_offset = printer["gcode_macro USER_VARIABLE"].rs_home_offset %}
  {% set rs_home_speed  = printer["gcode_macro USER_VARIABLE"].rs_home_speed %}
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed} MOVE=1 STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed} MOVE=-0.15
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed/2} MOVE=0.4 STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_rs SPEED={rs_home_speed} MOVE={rs_home_offset}
  MANUAL_STEPPER STEPPER=stepper_rs SET_POSITION=0
  M118 "RS axis homed."
  M400

# 大转盘回原点
[gcode_macro HOME_RB]
description: home RB axis via X endstop
gcode:
  USER_VARIABLE
  {% set rb_home_offset = printer["gcode_macro USER_VARIABLE"].rb_home_offset %}
  G28 X
  M118 "RB axis homed."
  G91
  G1 X{rb_home_offset} F3
  G90
  G92 X0
  M118 "RB axis offset applied: {rb_home_offset}"
  M400

# 入料推杆回原点
[gcode_macro HOME_Z_IN]
description: home z_in stepper
gcode:
  USER_VARIABLE
  {% set home_speed        = printer["gcode_macro USER_VARIABLE"].z_in_home_speed %}
  {% set home_distance     = printer["gcode_macro USER_VARIABLE"].z_in_home_distance %}
  {% set z_in_home_offset  = printer["gcode_macro USER_VARIABLE"].z_in_home_offset %}
  MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={home_speed} MOVE={z_in_home_offset * 1.5}
  MANUAL_STEPPER STEPPER=stepper_z_in ENABLE=1 SPEED={home_speed} SET_POSITION=0 MOVE=-{home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0 SPEED={home_speed} MOVE=-{z_in_home_offset}
  MANUAL_STEPPER STEPPER=stepper_z_in SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=JOG_Z_IN VARIABLE=z_in_position VALUE=0
  M118 "z_in homed."
  M400

# 出料推杆回原点
[gcode_macro HOME_Z_OUT]
description: home z_out stepper
gcode:
  USER_VARIABLE
  {% set home_speed        = printer["gcode_macro USER_VARIABLE"].z_out_home_speed %}
  {% set home_distance     = printer["gcode_macro USER_VARIABLE"].z_out_home_distance %}
  {% set z_out_home_offset = printer["gcode_macro USER_VARIABLE"].z_out_home_offset %}
  MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={home_speed} MOVE={z_out_home_offset * 1.5}
  MANUAL_STEPPER STEPPER=stepper_z_out ENABLE=1 SPEED={home_speed} SET_POSITION=0 MOVE=-{home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0 SPEED={home_speed} MOVE=-{z_out_home_offset}
  MANUAL_STEPPER STEPPER=stepper_z_out SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=JOG_Z_OUT VARIABLE=z_out_position VALUE=0
  M118 "z_out homed."
  M400

# 夹爪回原点
[gcode_macro HOME_G]
description: home gripper stepper
gcode:
  {% set gripper_speed         = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_home_distance = printer["gcode_macro USER_VARIABLE"].gripper_home_distance %}
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE=-1
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE={gripper_home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  M400

# 蠕动泵回原点（状态确认）
[gcode_macro HOME_P]
description: home pump (state check)
gcode:
  MANUAL_STEPPER STEPPER=stepper_p SET_POSITION=0 SPEED=2 MOVE=1
  MANUAL_STEPPER STEPPER=stepper_p SET_POSITION=0
  M400
