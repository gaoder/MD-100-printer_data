#####################################################################
#ZG从rack 上去瓶子并回到安全位置
#STEP_GET_TUBE
#####################################################################

[gcode_macro STEP_GET_TUBE]
description: step get tube 
gcode:
 # 输入rack 行列 默认为 1行 1列
 {% set rack_a_row = params.ROW|default(1)|int %}
 {% set rack_a_col = params.COL|default(1)|int %}
 #台面的卡槽的行列号 共两行 四列
 {% set slot_row = params.SROW|default(1)|int %}
 {% set slot_col = params.SCOL|default(1)|int %}

 #抓住瓶盖后上提ZG高度  不能与其他发生碰撞
 {% set zg_safty_pos = printer["gcode_macro USER_VARIABLE"].zg_safty_pos %} 

 # 示教位置 ：Tube rack. Base. 
 {% set rack_a_base_x = printer["gcode_macro USER_VARIABLE"].rack_a_base_x %}
 {% set rack_a_base_y = printer["gcode_macro USER_VARIABLE"].rack_a_base_y %}
 {% set rack_a_base_zg = printer["gcode_macro USER_VARIABLE"].rack_a_base_zg %}
 
 # dropcap base
 {% set dropcap_base_x = printer["gcode_macro USER_VARIABLE"].dropcap_base_x %}
 {% set dropcap_base_y = printer["gcode_macro USER_VARIABLE"].dropcap_base_y %}
 {% set dropcap_base_zg = printer["gcode_macro USER_VARIABLE"].dropcap_base_zg %}

 #及卡托盘行列间距
  {% set rack_row_spacing=printer["gcode_macro USER_VARIABLE"].rack_row_spacing %}
  {% set rack_col_spacing=printer["gcode_macro USER_VARIABLE"].rack_col_spacing %}
  {% set slot_row_spacing=printer["gcode_macro USER_VARIABLE"].slot_row_spacing %}
  {% set slot_col_spacing=printer["gcode_macro USER_VARIABLE"].slot_col_spacing %}
 
 #0Z_Z安全高度
 ZG_ZP_SAFE
 #1  XY到rack上方base 行 列
 XY_MOV_ABS XPOS={rack_a_base_x+rack_col_spacing*(rack_a_col-1) + slot_col_spacing*(slot_col-1)} YPOS={rack_a_base_y+rack_row_spacing*(rack_a_row-1)+ slot_row_spacing*(slot_row-1)}
 #2  ZG下降到学习位置 抓瓶子的盖子
 ZG_MOV_ABS ZGPOS={rack_a_base_zg-8}
 ZG_MOV_ABS ZGPOS={rack_a_base_zg} SPD=30
 #3 G夹紧
 G_CLOSE 
 #4 ZG上升安全位置 先缓慢 将瓶子从rack 拿出 再上升到安全位置
 ZG_MOV_ABS ZGPOS={rack_a_base_zg-16} SPD=100
 ZG_MOV_ABS ZGPOS={zg_safty_pos} 
 M400

