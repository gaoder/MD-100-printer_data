[gcode_macro G_OPEN]
description: 
gcode:
 
 {% set g_open_pos = 3 %}
 {% set g_work_speed = 8 %}
 {% set g_work_cur =1 %}
 
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0 SPEED={g_work_speed} MOVE=-{g_open_pos} STOP_ON_ENDSTOP=1 
 MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
 
 
[gcode_macro G_CLOSE]
description: 
gcode:
 
 {% set g_close_pos = 2.5 %}
 {% set g_work_speed = 8 %}

 
 
 MANUAL_STEPPER STEPPER=stepper_g SPEED={g_work_speed} MOVE={g_close_pos}
 

[gcode_macro GR_OPEN]
description: 
gcode:
 
 {% set gr_open_pos = 4 %}
 {% set gr_work_speed = 8 %}



 MANUAL_STEPPER STEPPER=stepper_gr SET_POSITION=0 
 MANUAL_STEPPER STEPPER=stepper_gr SPEED={gr_work_speed} MOVE=-{gr_open_pos} STOP_ON_ENDSTOP=1 
 MANUAL_STEPPER STEPPER=stepper_gr SET_POSITION=0 
 

[gcode_macro GR_CLOSE]
description: 
gcode:
 
 {% set gr_close_pos = 3.5 %}
 {% set gr_work_speed = 6 %}
 {% set gr_work_cur =1 %}

 MANUAL_STEPPER STEPPER=stepper_gr SPEED={gr_work_speed} MOVE={gr_close_pos}
 

[gcode_macro R_RUN]
description: 
gcode:
 
 {% set r_run_circle = 2.3 %}
 {% set r_work_speed = 2 %}
 {% set r_work_cur =1 %}
 
 MANUAL_STEPPER STEPPER=stepper_r SPEED={r_work_speed} MOVE={r_run_circle}
 MANUAL_STEPPER STEPPER=stepper_r SET_POSITION=0 
 

[gcode_macro MOV_P_MM]
gcode:
  
  
 {% set p_distance = params.DISTANCE|default(10)|float %}
 {% set p_speed = params.SPD|default(200)|float %}
 MANUAL_STEPPER STEPPER=stepper_zp SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_zp SPEED={p_speed} MOVE={p_distance}
 



[gcode_macro MOV_P]
description: move p
gcode:
 {% set Math_Pi=3.1415926536 %}
 {% set r=6.35 %} 
 #distance=Vol/(Math_Pi*r*r) unit: mm
 #vol unit: ul   
 #speed unit  ul/s 
 {% set P_Vol = params.VOL|default(2000)|float %}
 {% set P_Speed = params.SPD|default(1500)|float %}

 MANUAL_STEPPER STEPPER=stepper_p SET_POSITION=0
 MANUAL_STEPPER STEPPER=stepper_p SPEED={P_Speed/(Math_Pi*r*r)} MOVE={P_Vol/(Math_Pi*r*r*-1)}
 M118 "P move {P_Vol/(Math_Pi*r*r)} mm "



[gcode_macro ZG_MOV_ABS]
description: 
gcode: 
 {% set zg_abs_pos = params.ZGPOS|default(45)|float %}
 {% set zg_Speed = params.SPD|default(300)|float %}

 G90
 G1 z {zg_abs_pos}  f {zg_Speed * 60}
 G91
 
[gcode_macro ZP_MOV_ABS]
description: 
gcode:
 
 {% set zp_abs_pos = params.ZPPOS|default(45)|float %}
 {% set zp_Speed = params.SPD|default(300)|float %}

 MANUAL_STEPPER STEPPER=stepper_zp SPEED={zp_Speed} MOVE={zp_abs_pos}
 
[gcode_macro XY_MOV_ABS]
description: open up girper 
gcode:

 {% set x_abs_pos = params.XPOS|default(10)|float %}
 {% set y_abs_pos = params.YPOS|default(10)|float %}
 {% set xy_work_speed = 400 %}
 
 G90
 G1 x {x_abs_pos} y {y_abs_pos}  f {xy_work_speed * 60}
 G91

[gcode_macro ZG_ZP_SAFE]
