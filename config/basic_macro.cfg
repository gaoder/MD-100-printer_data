  {% set dropcap_offset_x = printer["gcode_macro USER_VARIABLE"].dropcap_offset_x %}

 #2 XY到 decap base上方

 XY_MOV_ABS XPOS={dropcap_base_x-30} YPOS={dropcap_base_y}
