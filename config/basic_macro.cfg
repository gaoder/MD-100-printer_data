#一吸两派有水罐不满的风险；
#改为1吸1排排满瓶子

[gcode_macro STEP_ASPIRATE]
description: step aspirate
gcode:
  
  # 输入吸液体 行列 默认为 1行 1列    共2行 6列 ;
 #{% set aspirate_row = params.ROW|default(1)|int %}
 {% set aspirate_row = 1 %}
 {% set aspirate_col = params.COL|default(1)|int %}
 #台面的卡槽的行列号 共两行 四列
 {% set slot_row = params.SROW|default(1)|int %}
 {% set slot_col = params.SCOL|default(1)|int %}

 #采用一吸二排
 {% set aspirate_vol = params.AVOL|default(2000)|int %}
 {% set dispense_vol = params.DVOL|default(4000)|int %}

 # 示教位置 ：瓶位置， 吐液体在上方
 {% set pipette_base_x = printer["gcode_macro USER_VARIABLE"].pipette_base_x %}
 {% set pipette_base_y = printer["gcode_macro USER_VARIABLE"].pipette_base_y %}
 #  探到瓶子的底部为基准
 {% set pipette_base_zp = printer["gcode_macro USER_VARIABLE"].pipette_base_zp %}
 # 吐液体底部偏移 瓶高+3MM
 {% set offset_zp_dispense= 5 %}
 {% set post_aspirate_vol = 200 %}
 {% set zp_slow_offset = 35 %}

 # 排液的位置, 高浓度直接隔离外排
 {% set dispense_base_zp = printer["gcode_macro USER_VARIABLE"].dispense_base_zp %}
 {% set dispense_base_x = printer["gcode_macro USER_VARIABLE"].dispense_base_x %}
 {% set dispense_base_y = printer["gcode_macro USER_VARIABLE"].dispense_base_y %}
 
 #托盘行列间距
 {% set rack_row_spacing=printer["gcode_macro USER_VARIABLE"].rack_row_spacing %}
 {% set rack_col_spacing=printer["gcode_macro USER_VARIABLE"].rack_col_spacing %}
 {% set slot_row_spacing=printer["gcode_macro USER_VARIABLE"].slot_row_spacing %}
 {% set slot_col_spacing=printer["gcode_macro USER_VARIABLE"].slot_col_spacing %}

# steps：
 #0Z_Z安全高度（）
  ZG_ZP_SAFE
 #1  XY到吸液体的位置-移动到XY瓶口上方
 
  XY_MOV_ABS XPOS={pipette_base_x + rack_col_spacing * (aspirate_col-1)+slot_col_spacing*(slot_col-1) } YPOS={pipette_base_y + rack_row_spacing*4 * (aspirate_row-1) + slot_row_spacing*(slot_row-1)}
 #2  ZG下降到吸液体位置 高低速两段速度
  ZP_MOV_ABS ZPPOS={pipette_base_zp-35}
  ZP_MOV_ABS ZPPOS={pipette_base_zp-2} SPD=40
  ZP_MOV_ABS ZPPOS={pipette_base_zp} SPD=5
 #3 吸瓶子里液体
  MOV_P VOL={aspirate_vol}
  G4 P800
 #4 ZP运动到管子上方 3mm 
  ZP_MOV_ABS ZPPOS={pipette_base_zp-40} SPD=40
  
 #5 移动到这一列后四个管子上方 
  XY_MOV_ABS XPOS={pipette_base_x + rack_col_spacing * (aspirate_col-1)+slot_col_spacing*(slot_col-1) } YPOS={pipette_base_y + rack_row_spacing*4 * aspirate_row + slot_row_spacing*(slot_row-1)}
  
  #ZG下降到吸液体位置
  ZP_MOV_ABS ZPPOS={pipette_base_zp-35}
  ZP_MOV_ABS ZPPOS={pipette_base_zp-2} SPD=140
  ZP_MOV_ABS ZPPOS={pipette_base_zp} SPD=5

 #6 二次吸液体
  MOV_P VOL={aspirate_vol}
  G4 P800
  ZP_MOV_ABS ZPPOS={pipette_base_zp-40} SPD=40

  ZG_ZP_SAFE
  MOV_P VOL={post_aspirate_vol}
 #增加后吸
  #7 move 退 tube
  XY_MOV_ABS XPOS={dispense_base_x-20} YPOS={dispense_base_y}
  ZP_MOV_ABS ZPPOS=117
  XY_MOV_ABS XPOS={dispense_base_x} YPOS={dispense_base_y}

  ZP_MOV_ABS ZPPOS={dispense_base_zp-40}

  XY_MOV_ABS XPOS={dispense_base_x+25} YPOS={dispense_base_y}
  
  ZP_MOV_ABS ZPPOS={dispense_base_zp}  SPD=4000
  
  MOV_P VOL={dispense_vol*(-1)+post_aspirate_vol*(-1)*2}
  G4 P500
  MOV_P VOL={post_aspirate_vol}
  G4 P200
  M400





