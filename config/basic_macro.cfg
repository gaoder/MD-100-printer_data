#======================================================================
# basic_macro.cfg — 内部原语层
# 规则：绝对无 M400，只被 workflow_macro.cfg 内部调用，禁止 Python 直接调用
#======================================================================

# 夹爪打开（回原点方向，走正值）
[gcode_macro G_OPEN]
description: gripper open (home direction)
gcode:
  {% set gripper_speed = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_home_distance = printer["gcode_macro USER_VARIABLE"].gripper_home_distance %}
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE={gripper_home_distance} STOP_ON_ENDSTOP=1
  MANUAL_STEPPER STEPPER=stepper_g SET_POSITION=0

# 夹爪关闭（走负值到夹持位置）
[gcode_macro G_CLOSE]
description: gripper close to grip position
gcode:
  {% set gripper_speed = printer["gcode_macro USER_VARIABLE"].gripper_speed %}
  {% set gripper_close_pos = printer["gcode_macro USER_VARIABLE"].gripper_close_pos %}
  MANUAL_STEPPER STEPPER=stepper_g SPEED={gripper_speed} MOVE=-{gripper_close_pos}

# 出料推杆绝对位置移动（无阻塞）
[gcode_macro Z_OUT_MOV_ABS]
description: z_out absolute move, no M400
gcode:
  {% set pos = params.POS|default(106)|float %}
  {% set spd = params.SPD|default(300)|float %}
  MANUAL_STEPPER STEPPER=stepper_z_out SPEED={spd} MOVE={pos}

# 入料推杆绝对位置移动（无阻塞）
[gcode_macro Z_IN_MOV_ABS]
description: z_in absolute move, no M400
gcode:
  {% set pos = params.POS|default(105.5)|float %}
  {% set spd = params.SPD|default(300)|float %}
  MANUAL_STEPPER STEPPER=stepper_z_in SPEED={spd} MOVE={pos}

# 蠕动泵累计转圈（无阻塞）
[gcode_macro PUMP_TOTAL_REV]
description: pump run N revolutions, no M400
gcode:
  {% set vol = params.VOL|default(1)|float %}
  {% set spd = params.SPEED|default(1)|float %}
  MANUAL_STEPPER STEPPER=stepper_p SET_POSITION=0
  MANUAL_STEPPER STEPPER=stepper_p SPEED={spd} MOVE={vol}
