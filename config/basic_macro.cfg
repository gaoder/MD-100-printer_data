# steps：
 #0Z_Z安全高度（）
  ZG_ZP_SAFE
 #1  XY到吸液体的位置-移动到清洗上方
 
  XY_MOV_ABS XPOS={clean_tank_x} YPOS={clean_tank_y}
  MOV_P VOL={post_aspirate_vol} SPD=2000
